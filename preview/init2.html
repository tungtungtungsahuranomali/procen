<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" 
"http://www.w3.org/TR/html4/loose.dtd">
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		 <meta charset="UTF-8"> 
		<title>Insert title here</title>
		<link type="text/css" rel="Stylesheet" href="jslgvkeyboard/LgVKeyboard.css" />
		<script id="mainVKScript" type="text/javascript" src="jslgvkeyboard/LgVKeyboard.js"></script>
		<script>
		function onKeyDown(event){
			var keyCode = event.keyCode;
			document.getElementById("output").value += "keyCode? : " + keyCode+ " ";
			/*switch(keyCode) {
				case VK_LEFT :
					document.getElementById('text1.3').blur();
					document.getElementById('text1.1').focus();
				break;
				case VK_RIGHT :
					document.getElementById('text1.1').blur();
					document.getElementById('text1.3').focus();
				break;
			}*/
			event.returnValue = false;
		}
		function addInputBox(){
			document.getElementById("addInput").innerHTML = '<input type="text" id="text1.4" value="test 1.4" style="width:180px" role="textbox" style="color: yellow; background-color: gray">';
		}
		function updateVKStatus(){
			document.getElementById("output").value += "Shown? : " + lgKb.isShown();
			document.getElementById("output").value += "updateVKStatus ";
		}
		function onInitialized(){
			setInterval(updateVKStatus, 3000);
			document.getElementById("output").value += "onInitialized "; 
			lgKb.onShow = function () { 
				document.getElementById("output").value += "Show event occur "; 
			};
			lgKb.onHide = function () { 
				document.getElementById("output").value += "Hide event occur "; 
			};
			lgKb.onKeyDown = onKeyDown;
			document.getElementById("output").value += "onKeyDown ";
			lgKb.targetBgColor = "#934910";
			lgKb.targetTextColor = "blue";
			document.getElementById('text1.1').focus();
		}
		function initPage(){
			if(window.lgKb == null){  // for 2014 TV
				document.getElementById('text1.1').focus();
				document.getElementById("output").value += "lgKb null ";  
			}else{
				lgKb.setInitEventHandler(onInitialized);
				document.getElementById("output").value += "lgKb not null "; 
			}
		}
		</script>
	</head>
	<body onload="initPage();">
		<div>Lg Virtual Keyboard Test</div>
		<div style="height: 150px;">
		<input type="text" id="text1.1" value="test 1.1" style="width:180px" role="textbox" style="color: yellow; background-color: gray">
		<input type="password" id="text1.2" value="test 1.2" style="width:180px">
		<textarea rows="4" cols="20" id="text1.3" value="test 1.3"> </textarea>
		<input type="text" id="output" style="width:180px" style="color: yellow; backgroundcolor: gray">
		<div id="addInput"> </div>
		<input type="button" value="refresh" onclick="location.reload();">
		<input type="button" value="Add" onclick="addInputBox();">
		</div>
	</body>
</html>
